server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão para arquivos estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache agressivo para assets com hash no nome (gerados pelo Vite)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: qualquer rota que não seja um arquivo real cai no
    # index.html, para o React Router assumir o roteamento no client.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Não expõe arquivos ocultos (ex: .env que porventura vazasse)
    location ~ /\. {
        deny all;
    }
}
